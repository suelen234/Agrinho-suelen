<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioMercado - Soluções Biológicas</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>

<h1>🌱 BioMercado</h1>

<p>Substituindo agroquímicos por soluções biológicas sustentáveis</p>

</header>

<section class="filters">

<input
type="text"
id="search"
placeholder="Pesquisar praga, cultura ou produto..."
>

<div class="buttons">

<button data-category="Todos">Todos</button>

<button data-category="Pragas">Pragas</button>

<button data-category="Fungos">Fungos</button>

<button data-category="Biofertilizantes">Biofertilizantes</button>

<button data-category="Insetos">Insetos Benéficos</button>

</div>

</section>

<section class="stats">

<div class="card-stat">
<h2 id="totalProducts">0</h2>
<p>Produtos</p>
</div>

<div class="card-stat">
<h2 id="totalCultures">0</h2>
<p>Culturas</p>
</div>

<div class="card-stat">
<h2 id="totalCategories">0</h2>
<p>Categorias</p>
</div>

</section>

<section id="products" class="products-grid">

</section>

<script src="script.js"></script>

</body>
</html>
